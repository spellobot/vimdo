<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;">
    <title>VimDo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">

        <div class="workspace">

            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span id="folderBreadcrumb">All folders</span>
                    <span class="task-count" id="taskCount">0 tasks</span>
                </div>
                <nav class="file-tree" id="fileTree">
                    <!-- Tasks are rendered here by app.js -->
                </nav>
                <div class="sidebar-footer">
                    <span class="hint"><kbd>j</kbd>/<kbd>k</kbd> navigate</span>
                    <span class="hint"><kbd>:</kbd> command</span>
                    <span class="hint"><kbd>i</kbd> edit</span>
                    <span class="hint"><kbd>x</kbd> toggle</span>
                </div>
            </aside>

            <main class="content-viewer" id="contentViewer">

                <article id="renderView" class="view-mode">
                    <header class="task-header">
                        <h1 id="taskTitle">Loading…</h1>
                        <div class="metadata-bar">
                            <span class="badge priority-low" id="priorityBadge">—</span>
                            <span class="badge status-pending" id="statusBadge">—</span>
                            <div class="tags-list" id="taskTags">
                                <!-- tags -->
                            </div>
                        </div>
                    </header>
                    <hr class="divider">
                    <section id="markdownContent" class="markdown-body">
                        <p class="empty-state">Loading tasks…</p>
                    </section>
                </article>

                <textarea id="markdownEditor" class="edit-mode hidden" placeholder="Escreva a descrição da tarefa em Markdown bruto..." spellcheck="false"></textarea>

            </main>
        </div>

        <footer class="status-bar">
            <div class="left-status">
                <div class="vim-mode text-bold" id="vimMode">NORMAL</div>
                <div class="file-info" id="fileInfo">—</div>
            </div>

            <div class="right-status">
                <div class="command-area">
                    <span class="command-prefix" id="commandPrefix">:</span>
                    <input type="text" id="commandInput" class="command-input" autocomplete="off" spellcheck="false" readonly>
                </div>
                <div class="sync-status" id="syncStatus">● Ready</div>
            </div>
        </footer>

    </div>

    <script src="app.js"></script>
</body>
</html>
